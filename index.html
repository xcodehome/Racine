<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Domaine Réservé | Bouygues Construction</title>
    <style>
        /* Identité visuelle Bouygues Construction */
        :root {
            --min-orange: #FF5E00; /* Le orange spécifique Construction */
            --dark-grey: #333333;
            --light-bg: #f8f9fa;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--light-bg);
            font-family: 'Arial', sans-serif;
            color: var(--dark-grey);
            text-align: center;
        }

        .container {
            background: white;
            padding: 50px 40px;
            border-left: 8px solid var(--min-orange); /* Accentuation Orange */
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            border-radius: 4px;
            max-width: 450px;
            width: 90%;
        }

        .brand {
            font-size: 1.4rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -0.5px;
            margin-bottom: 30px;
        }

        .brand .company { color: var(--dark-grey); }
        .brand .tag { color: var(--min-orange); }

        h1 {
            font-size: 1.6rem;
            margin-bottom: 15px;
            font-weight: 700;
        }

        p {
            font-size: 1rem;
            color: #666;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .contact-card {
            border: 2px solid var(--min-orange);
            padding: 20px;
            border-radius: 2px;
            background-color: rgba(255, 94, 0, 0.03);
        }

        .contact-label {
            display: block;
            font-size: 0.8rem;
            text-transform: uppercase;
            color: #888;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .contact-name {
            font-weight: bold;
            color: var(--min-orange);
            font-size: 1.25rem;
        }

        .footer {
            margin-top: 40px;
            font-size: 0.75rem;
            color: #bbb;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="brand">
            <span class="company">Bouygues</span> <span class="tag">Construction</span>
        </div>
        
        <h1>Ce domaine est réservé</h1>
        <p>Ce nom de domaine a été enregistré pour un usage du groupe.</p>

        <div class="contact-card">
            <span class="contact-label">Contact référent</span>
            <span class="contact-name">NGUYEN Viet Toan</span>
        </div>

        <div class="footer">
            &copy; 2026 Bouygues Construction
        </div>
    </div>

</body>
</html>
