<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Domaine Réservé | Bouygues Construction</title>
    <style>
        /* Style minimaliste et professionnel */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f7f9;
            font-family: 'Segoe UI', Arial, sans-serif;
            color: #333;
            text-align: center;
        }

        .container {
            background: white;
            padding: 40px;
            border-top: 5px solid #005691; /* Bleu Bouygues */
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border-radius: 8px;
            max-width: 500px;
            width: 90%;
        }

        .logo {
            font-weight: bold;
            font-size: 1.2rem;
            color: #005691;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .logo span {
            color: #e2001a;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        p {
            color: #666;
            margin-bottom: 25px;
        }

        .contact-box {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 5px;
            border: 1px solid #eee;
        }

        .contact-name {
            font-weight: bold;
            color: #005691;
            display: block;
            font-size: 1.1rem;
        }

        .footer-note {
            margin-top: 30px;
            font-size: 0.8rem;
            color: #aaa;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">Bouygues <span>Construction</span></div>
        
        <h1>Domaine Réservé</h1>
        <p>Ce nom de domaine a été enregistré pour un usage futur par le groupe.</p>

        <div class="contact-box">
            <p style="margin-bottom: 5px; font-size: 0.9rem;">Pour toute information, contactez :</p>
            <span class="contact-name">NGUYEN Viet Toan</span>
        </div>

        <div class="footer-note">
            &copy; 2026 Bouygues Construction. Tous droits réservés.
        </div>
    </div>

</body>
</html>
